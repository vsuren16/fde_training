services:
  mongo:
    image: mongo:7
    container_name: ai-product-search-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ai-product-search-backend
    ports:
      - "8050:8050"
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend/chroma_data:/app/chroma_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8050/health/live')"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: ai-product-search-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:8050
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
