<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Management</title>

  <!-- Bootstrap CSS -->
  <link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>
    body {
      background-color: #f8f9fa;
    }
    .container {
      margin-top: 40px;
    }
    table th, table td {
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 class="text-center mb-4">User Management</h2>

  <!-- ADD / UPDATE FORM -->
  <div class="card mb-4">
    <div class="card-body">
      <h5>Add / Update User</h5>

      <input type="hidden" id="userId">

      <div class="row">
        <div class="col-md-6">
          <input type="text" id="name" class="form-control mb-2" placeholder="Name">
        </div>
        <div class="col-md-6">
          <input type="email" id="email" class="form-control mb-2" placeholder="Email">
        </div>
      </div>

      <button class="btn btn-primary" onclick="addOrUpdateUser()">Save User</button>
      <button class="btn btn-secondary" onclick="resetForm()">Reset</button>
    </div>
  </div>

  <!-- USER TABLE -->
  <div class="card">
    <div class="card-body">
      <h5>User List</h5>

      <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th width="180">Actions</th>
          </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API_URL = "http://localhost:3000/users";

  // Load users on page load
  document.addEventListener("DOMContentLoaded", loadUsers);

  async function loadUsers() {
    const res = await fetch(API_URL);
    const users = await res.json();

    const tbody = document.getElementById("userTableBody");
    tbody.innerHTML = "";

    users.forEach(user => {
      tbody.innerHTML += `
        <tr>
          <td>${user.name}</td>
          <td>${user.email}</td>
          <td>
            <button class="btn btn-sm btn-warning" onclick="editUser('${user._id}', '${user.name}', '${user.email}')">
              Edit
            </button>
            <button class="btn btn-sm btn-danger" onclick="deleteUser('${user._id}')">
              Delete
            </button>
          </td>
        </tr>
      `;
    });
  }

  async function addOrUpdateUser() {
    const id = document.getElementById("userId").value;
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    if (!name || !email) {
      alert("Please fill all fields");
      return;
    }

    const userData = { name, email };

    if (id) {
      // UPDATE
      await fetch(`${API_URL}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(userData)
      });
    } else {
      // CREATE
      await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(userData)
      });
    }

    resetForm();
    loadUsers();
  }

  function editUser(id, name, email) {
    document.getElementById("userId").value = id;
    document.getElementById("name").value = name;
    document.getElementById("email").value = email;
  }

  async function deleteUser(id) {
    if (!confirm("Are you sure?")) return;

    await fetch(`${API_URL}/${id}`, {
      method: "DELETE"
    });

    loadUsers();
  }

  function resetForm() {
    document.getElementById("userId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
  }
</script>

</body>
</html>
